<html>
	<head>
		<style>
			body {
				background-color: #222;
			}
			canvas {
				background-color: #171717;
			}
		</style>
	</head>
	<body>
		<canvas width="256" height="256"></canvas>
		<div>
			<button onclick="next()">Reset</button>
			<button onclick="failure()">I see nothing</button>
			<button onclick="togglePlot()">Toggle plot</button>
		</div>
	</body>
</html>
<script>
	const [canvas, graph] = document.querySelectorAll('canvas');
	const ctx = canvas.getContext('2d');
	const getColor = (hue, sat, bright) => {
		let r = 0,
			g = 0,
			b = 0;
		if (hue < 1 / 3) {
			g = hue * 3;
			r = 1 - g;
		} else if (hue < 2 / 3) {
			b = hue * 3 - 1;
			g = 1 - b;
		} else {
			r = hue * 3 - 2;
			b = 1 - r;
		}
		const max = Math.max(r, g, b);
		const t = bright * 255;
		const m = (sat * t) / max;
		const c = (1 - sat) * t;
		r = Math.round(r * m + c);
		g = Math.round(g * m + c);
		b = Math.round(b * m + c);
		return `rgb(${r}, ${g}, ${b})`;
	};
	const nCols = 50;
	const nRows = 50;
	const cellSize = 5;
	const spaceSize = 2;
	const stride = cellSize + spaceSize;
	const startX = spaceSize;
	const startY = spaceSize;
	canvas.width = nCols * stride + spaceSize;
	canvas.height = nRows * stride + spaceSize;
	const deltaSat = 0.5;
	const deltaBright = 0.5;
	const outerRadius = Math.min(canvas.width, canvas.height) * 0.15;
	const innerRadius = outerRadius * 0.6;
	const minDeltaHue = 0.05;
	const maxDeltaHue = 0.15;
	const minLog = Math.log(minDeltaHue);
	const deltaLog = Math.log(maxDeltaHue) - minLog;
	let targetX, targetY, startTime, midHue, deltaHue;
	let plotting = false;
	const dataPoints = JSON.parse(localStorage.getItem('dataPoints') || '[]');
	const next = () => {
		plotting = false;
		targetX = canvas.width * (Math.random() * 0.8 + 0.1);
		targetY = canvas.height * (Math.random() * 0.8 + 0.1);
		deltaHue = Math.exp(Math.random() * deltaLog + minLog);
		midHue = Math.random();
		const sign = Math.random() < 0.5 ? -1 : 1;
		const hue1 = (midHue + (sign * deltaHue) / 2 + 1) % 1;
		const hue2 = (midHue - (sign * deltaHue) / 2 + 1) % 1;
		for (let i = 0; i < nRows; i++) {
			const y = startY + stride * i;
			const cy = y + cellSize / 2;
			for (let j = 0; j < nCols; j++) {
				const x = startX + j * stride;
				const cx = x + cellSize / 2;
				const radius = Math.sqrt((cx - targetX) ** 2 + (cy - targetY) ** 2);
				const hue = radius < outerRadius && radius > innerRadius ? hue1 : hue2;
				const sat = 1 - Math.random() * deltaSat;
				const bright = 1 - Math.random() * deltaBright;
				ctx.fillStyle = getColor(hue, sat, bright);
				ctx.fillRect(x, y, cellSize, cellSize);
			}
		}
		startTime = Date.now();
	};
	const failure = () => {
		dataPoints.push({ midHue, deltaHue, delay: Infinity });
		next();
	};
	canvas.addEventListener('click', (e) => {
		const x = e.offsetX;
		const y = e.offsetY;
		const radius = Math.sqrt((x - targetX) ** 2 + (y - targetY) ** 2);
		const delay =
			radius < outerRadius ? (Date.now() - startTime) / 1000 : Infinity;
		dataPoints.push({ midHue, deltaHue, delay });
		localStorage.setItem('dataPoints', JSON.stringify(dataPoints));
		next();
	});
	next(Math.random(), 0.3);
	const togglePlot = () => {
		ctx.clearRect(0, 0, canvas.width, canvas.height);
		plotting = !plotting;
		if (!plotting) {
			next();
			return;
		}
		for (const { midHue, deltaHue, delay } of dataPoints) {
			const value = Math.max(0, Math.min(1, 0.8 / delay));
			const color = getColor(value / 3, 1, 1)
				.replace('rgb', 'rgba')
				.replace(')', ',0.1)');
			console.log({ delay, value, color });
			const x = midHue * canvas.width;
			const y = (1 - (Math.log(deltaHue) - minLog) / deltaLog) * canvas.height;
			ctx.fillStyle = color;
			ctx.beginPath();
			ctx.arc(x, y, 7, 0, Math.PI * 2);
			ctx.fill();
		}
	};
</script>
